<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edle" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Результаты</title>
    <link href="../style.css" rel="stylesheet" />
</head>

<body class="main_variants">
    <header class="header">
        <div class="container">
            <a href="../index.html" class="main_html">Решайка</a>
            <nav class="header__nav">
                <ul class="header__list">
                    <li><a class="header__link_d" href="#!">Открытый банк заданий</a></li>
                    <li><a class="header__link" href="../info.html">Информация</a></li>
                </ul>
            </nav>

            <a href="../index.html" class="btn">НА ГЛАВНУЮ</a>

        </div>
    </header>

    <main class="main">
        <selector class="select_var">
            <div class="_result_oglavlenie" style="display: inline-table; text-align: center;">
                <h1 style="margin-bottom: 10px;">Результаты 1 варианта ЕГЭ по русскому</h1>
                <div style="margin-bottom: 10px; display: flex; justify-content: center;">
                    <p>Вы набрали </p>
                    <p id="rus_user_score"></p>
                    <p> из 100 баллов</p>
                </div>
                <div id="result_testik" style="margin-bottom: 10px; font-size: 24px; font-weight: bold; opacity: 0.5;"></div>
            </div>
            <div id="psi_test_result" style="text-align: center;"></div>
            <div id="results-container" style="gap: 20px; display: flex; flex-direction: row; justify-content: center; align-items: center; flex-wrap: wrap;">
                <div id="result-table1" style="flex: 1 1 45%; min-width: 400px;">
                </div>
                <div id="result-table2" style="flex: 1 1 45%; min-width: 400px;">
                </div>
            </div>
            <div id="svodka_score" style="display: flex;justify-content: center;align-items: center;">
                <p>Тестовая часть: <div id="score_test_s"></div> из 28. Развёрнутая часть: <div id="score_test_r"></div> из 22.</p>
            </div>
        </selector>
    </main>
    <script>
    (function() {
        // --- Загрузка данных из localStorage ---
        const userAnswers = JSON.parse(localStorage.getItem('rusAnswers')) || {};
        const correctAnswers = JSON.parse(localStorage.getItem('rusCorrectAnswers')) || {};
        const taskScores = JSON.parse(localStorage.getItem('rusTaskScores')) || {};
        const criteriaScores = JSON.parse(localStorage.getItem('criteriaScores')) || {};
        const moodScore = localStorage.getItem('moodScore') || '0';

        // Максимальные баллы за критерии К1–К12
        const maxCriteriaScores = {
            K1: 1, K2: 5, K3: 1, K4: 1, K5: 2,
            K6: 2, K7: 3, K8: 3, K9: 2, K10: 2,
            K11: 1, K12: 1
        };

        // --- Таблица 1: Тестовая часть (задания 1–26) ---
        const container1 = document.getElementById('result-table1');
        if (container1) {
            const title = document.createElement('h2');
            title.textContent = 'Тестовая часть';
            title.style.fontWeight = 'bold';
            container1.appendChild(title);

            const table = document.createElement('table');
            table.style.width = '100%';
            table.style.borderCollapse = 'collapse';
            table.style.backgroundColor = '#f0f0f0';
            table.innerHTML = `
                <tr style="background-color: #1296a2; color: white;">
                    <th>№</th>
                    <th>Ваш ответ</th>
                    <th>Правильный ответ</th>
                    <th>Балл</th>
                </tr>
            `;

            let totalTestScore = 0;

            for (let i = 1; i <= 26; i++) {
                const userAns = (userAnswers[i] || '').toString().trim();
                const correctAns = (correctAnswers[i] || '').toString().trim();
                const isCorrect = userAns.toLowerCase() === correctAns.toLowerCase();
                const score = isCorrect ? (taskScores[i] || 1) : 0;
                totalTestScore += score;

                const row = document.createElement('tr');
                row.style.backgroundColor = isCorrect ? '#c8e6c9' : '#ffcdd2';
                row.innerHTML = `
                    <td style="border: 1px solid #ccc; padding: 8px;">${i}</td>
                    <td style="border: 1px solid #ccc; padding: 8px;">${userAns || '—'}</td>
                    <td style="border: 1px solid #ccc; padding: 8px;">${correctAns}</td>
                    <td style="border: 1px solid #ccc; padding: 8px;">${score}</td>
                `;
                table.appendChild(row);
            }

            container1.appendChild(table);
            document.getElementById('score_test_s').textContent = totalTestScore;
            window.testScore = totalTestScore;
        }

        // --- Таблица 2: Развёрнутая часть (критерии К1–К12) ---
        const container2 = document.getElementById('result-table2');
        if (container2) {
            const title = document.createElement('h2');
            title.textContent = 'Развёрнутая часть';
            title.style.fontWeight = 'bold';
            container2.appendChild(title);

            const table = document.createElement('table');
            table.style.width = '100%';
            table.style.borderCollapse = 'collapse';
            table.style.backgroundColor = '#f0f0f0';
            table.innerHTML = `
                <tr style="background-color: #186791; color: white;">
                    <th>Критерий</th>
                    <th>Ваш балл</th>
                    <th>Макс. балл</th>
                </tr>
            `;

            let totalCriteriaScore = 0;
            const criteriaList = ['K1','K2','K3','K4','K5','K6','K7','K8','K9','K10','K11','K12'];

            criteriaList.forEach(key => {
                const userScore = criteriaScores[key] || 0;
                const maxScore = maxCriteriaScores[key];
                totalCriteriaScore += userScore;

                const row = document.createElement('tr');
                let bgColor;
                if (userScore === maxScore) bgColor = '#c8e6c9';      // зелёный
                else if (userScore > 0) bgColor = '#fff9c4';          // жёлтый
                else bgColor = '#ffcdd2';                             // красный

                row.style.backgroundColor = bgColor;
                row.innerHTML = `
                    <td style="border: 1px solid #ccc; padding: 8px;">${key}</td>
                    <td style="border: 1px solid #ccc; padding: 8px;">${userScore}</td>
                    <td style="border: 1px solid #ccc; padding: 8px;">${maxScore}</td>
                `;
                table.appendChild(row);
            });

            container2.appendChild(table);
            document.getElementById('score_test_r').textContent = totalCriteriaScore;
            window.criteriaScore = totalCriteriaScore;
        }

        // --- Подсчёт первичного и вторичного баллов ---
        const primaryScore = (window.testScore || 0) + (window.criteriaScore || 0);

        // Шкала перевода первичных баллов (0–50) во вторичные (0–100)
        const conversionTable = {
            0:0, 1:3, 2:5, 3:8, 4:10, 5:12, 6:15, 7:17, 8:20, 9:22, 10:24,
            11:27, 12:29, 13:32, 14:34, 15:36, 16:37, 17:39, 18:40, 19:42,
            20:43, 21:45, 22:46, 23:48, 24:49, 25:51, 26:52, 27:54, 28:55,
            29:57, 30:58, 31:60, 32:61, 33:63, 34:64, 35:66, 36:67, 37:69,
            38:70, 39:72, 40:73, 41:75, 42:78, 43:81, 44:83, 45:86, 46:89,
            47:91, 48:94, 49:97, 50:100
        };
        const secondaryScore = conversionTable[primaryScore] || 0;
        document.getElementById('rus_user_score').textContent = secondaryScore;

        // --- Вывод психологического теста ---
        const moodDiv = document.getElementById('result_testik');
        if (moodDiv) {
            const moodMap = {
                '0': '0',
                '1': '1',
                '2': '2'
            };
            moodDiv.textContent = `${moodMap[moodScore] || 'Не выбран'}`;
        }

        // Опционально: очистка localStorage после отображения результатов
        localStorage.clear();
    })();
</script>
</body>
</html>
