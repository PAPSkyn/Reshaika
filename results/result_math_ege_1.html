<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edle" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Результаты</title>
    <link href="../style.css" rel="stylesheet" />
</head>

<body class="main_variants">
    <header class="header">
        <div class="container_header">
            <a href="../index.html" class="main_html">Решайка</a>
            <nav class="header__nav">
                <ul class="header__list">
                    <li><a class="header__link_d" href="#!">Открытый банк заданий</a></li>
                    <li><a class="header__link" href="../info.html">Информация</a></li>
                </ul>
            </nav>

            <a href="../index.html" class="btn">НА ГЛАВНУЮ</a>

        </div>
    </header>

    <main class="main">
        <selector class="select_var">
            <div class="_result_oglavlenie" style="display: inline-table; text-align: center;">
                <h1 style="margin-bottom: 10px;">Результаты 1 варианта ЕГЭ по базе математики</h1>
                <div id="result_testik" style="margin-bottom: 10px; font-size: 24px; font-weight: bold; opacity: 0.5;"></div>
            </div>
            <div id="results-container"></div>
        </selector>
    </main>

    <script>
        const correctAnswers = {
            "1": "8",
            "2": "4312",
            "3": "72",
            "4": "3,2",
            "5": "0,52",
            "6": "51 или 24 или 42",
            "7": "1432",
            "8": "4",
            "9": "35",
            "10": "1260",
            "11": "490",
            "12": "2,5",
            "13": "55",
            "14": "8,8",
            "15": "93500",
            "16": "27",
            "17": "22,4",
            "18": "1243",
            "19": "7065 или 7175 или 7285 или 7395",
            "20": "11",
            "21": "25",
        };

        const alternativeAnswers = {
            "6": ["51", "24", "42"],
            "19": ["7065", "7175", "7285", "7395"],
        };

        // Получаем ответы пользователя
        const userAnswers = JSON.parse(localStorage.getItem('userAnswers') || '{}');

        // получаем рузультат ПсхТст
        const moodScore = localStorage.getItem('moodScore');
        const resultDiv = document.getElementById('result_testik');
        if (moodScore) {
            resultDiv.textContent = `${moodScore}`;
        } else {
            resultDiv.textContent = 'Результат психологического теста не пройден.';
        }

        function normalizeAnswer(str) {
            if (!str) return '';
            return str.trim().toLowerCase().replace(',', '.');
        }

        function isAnswerCorrect(taskNum, userAnswer, correctAnswer) {
            if (!userAnswer) return false;

            let normUser = normalizeAnswer(userAnswer);
            let normCorrect = normalizeAnswer(correctAnswer);

            // 1. Проверка по альтернативным вариантам
            if (alternativeAnswers[taskNum]) {
                const altNormalized = alternativeAnswers[taskNum].map(opt => normalizeAnswer(opt));
                if (altNormalized.includes(normUser)) return true;
            }

            // 2. Проверка для заданий, где порядок не важен (например, комбинации цифр)
            // if (unorderedTasks.includes(taskNum)) {
            //     const sortStr = (s) => s.split('').sort().join('');
            //     return sortStr(normUser) === sortStr(normCorrect);
            // }

            // 3. Обычное сравнение
            return normUser === normCorrect;
        }

        function buildResultsTable() {
            const container = document.getElementById('results-container');
            if (!container) return;

            let html = `<table class="results-table"><thead><tr>
                <th>№ задания</th><th>Ваш ответ</th><th>Правильный ответ</th>
            </tr></thead><tbody>`;

            // Проходим по всем номерам заданий, которые есть в correctAnswers
            for (let taskNum in correctAnswers) {
                const userAns = userAnswers[taskNum] || '—';
                const correctAns = correctAnswers[taskNum];
                // const cellClass = (userAns === correctAns) ? 'correct' : 'incorrect';
                const isCorrect = isAnswerCorrect(taskNum, userAns, correctAns);
                const cellClass = isCorrect ? 'correct' : 'incorrect';

                html += `<tr>
                    <td>${taskNum}</td>
                    <td class="${cellClass}">${userAns}</td>
                    <td>${correctAns}</td>
                </tr>`;
            }

            html += `</tbody></table>`;
            container.innerHTML = html;
        }
        // Вызываем построение таблицы после загрузки страницы
        window.addEventListener('DOMContentLoaded', buildResultsTable);
    </script>
</body>

</html>
