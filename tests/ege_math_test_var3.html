<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edle" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Тестирование</title>
    <link href="../style.css" rel="stylesheet" />
</head>

<body class="main_variants">
    <header class="header">
        <div class="container_header">
            <a href="../index.html" class="main_html">Решайка</a>
            <nav class="header__nav">
                <ul class="header__list">
                    <li><a class="header__link_d" href="#!">Открытый банк заданий</a></li>
                    <li><a class="header__link" href="../info.html">Информация</a></li>
                </ul>
            </nav>
            <a href="../variants/ege/var3.html" class="btn">ВЕРНУТЬСЯ</a>
        </div>
    </header>
    
    <main class="main">
        <selector class="select_var">
            <section class="react_window">
                <div style="margin: auto; text-align: center; margin-top: 20px; font-size: 30px; width: 800px;">Как вы думаете, какая картинка и подпись больше похожа на вас в последнее время?</div>
                <div class="react_sector">
                    <div class="react_img" data-score="0">
                        <div class="img"><img src="jpg/3.1.jpg" alt="" style="object-fit: cover; height: 300px; object-position: 0 0;"></div>
                        <div class="test_otvet">
                            <h3 style="margin: 0;">У меня все отлично и под контролем</h3>
                        </div>
                    </div>
                    <div class="react_img" data-score="1">
                        <div class="img"><img src="jpg/3.2.jpg" alt="" style="height: 300px;"></div>
                        <div class="test_otvet"><h3>Что то опять не получается ну и ладно, и не очень то хотелось</h3></div>                        
                    </div>
                    <div class="react_img" data-score="2">
                        <div class="img"><img src="jpg/3.3.jpg" alt=""></div>
                        <div class="test_otvet"><h3>Это не так, то не так, все не так, я ничего не могу</h3></div>                        
                    </div>
                </div>
                <div style="padding-top: 50px; padding-bottom: 50px;">
                    <button class="btn_finish" style="display: flex; margin: auto; font-size: 30px; width: fit-content; border-radius: 10px;">Показать результаты</button>
                </div>
            </section>
        </selector>
    </main>
    <script>
        (function() {
            const images = document.querySelectorAll('.react_img');
            const finishButton = document.querySelector('.btn_finish');
            let selectedScore = null;

            // Обработчик выбора картинки
            images.forEach(img => {
                img.addEventListener('click', function() {
                    // Убираем выделение со всех
                    images.forEach(i => i.classList.remove('selected'));
                    // Выделяем текущую
                    this.classList.add('selected');
                    // Запоминаем балл
                    selectedScore = this.getAttribute('data-score');
                });
            });

            // Обработчик кнопки "Показать результаты"
            finishButton.addEventListener('click', function() {
                if (selectedScore === null) {
                    alert('Пожалуйста, выберите один из вариантов. Это необходимо для завершения теста.');
                    return;
                }
                // Сохраняем результат психологического теста
                localStorage.setItem('moodScore', selectedScore);
                // Переходим на страницу результатов
                window.location.href = '../results/result_math_ege_3.html';
            });
        })();
    </script>
</body>
</html>
